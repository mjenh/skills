# Team override — slug-folder artifact layout.
# See _bmad/custom/artifact-layout.md

[workflow]
brief_output_path = "{planning_artifacts}"
run_folder_pattern = "{slug}"

persistent_facts = [
  "file:{project-root}/_bmad/custom/artifact-layout.md",
  "Write the primary deliverable as {slug}-brief.md inside {planning_artifacts}/{slug}/. Reuse an existing slug when resuming.",
]
